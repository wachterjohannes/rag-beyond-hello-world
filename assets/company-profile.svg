<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <!-- Background building -->
    <rect x="100" y="100" width="200" height="250" fill="#E8E6DE" stroke="#1a2b4e" stroke-width="4"/>

    <!-- Windows -->
    <g fill="#3f6e77" opacity="0.8">
        <rect x="120" y="120" width="40" height="40" rx="2"/>
        <rect x="180" y="120" width="40" height="40" rx="2"/>
        <rect x="240" y="120" width="40" height="40" rx="2"/>

        <rect x="120" y="180" width="40" height="40" rx="2"/>
        <rect x="180" y="180" width="40" height="40" rx="2"/>
        <rect x="240" y="180" width="40" height="40" rx="2"/>

        <rect x="120" y="240" width="40" height="40" rx="2"/>
        <rect x="180" y="240" width="40" height="40" rx="2"/>
        <rect x="240" y="240" width="40" height="40" rx="2"/>
    </g>

    <!-- Door -->
    <rect x="175" y="300" width="50" height="50" fill="#1a2b4e"/>

    <!-- Company Logo -->
    <g transform="translate(150, 40)">
        <circle cx="50" cy="30" r="25" fill="#3f6e77"/>
        <text x="50" y="40" font-family="Arial" font-size="24" fill="white" text-anchor="middle">P</text>
    </g>

    <!-- AI Elements -->
    <g stroke="#1a2b4e" stroke-width="2" fill="none">
        <path d="M30,200 C50,180 70,220 90,200" />
        <path d="M310,200 C330,180 350,220 370,200" />
    </g>

    <!-- Connected nodes suggesting AI/Network -->
    <g>
        <circle cx="40" cy="200" r="4" fill="#3f6e77"/>
        <circle cx="80" cy="200" r="4" fill="#3f6e77"/>
        <circle cx="320" cy="200" r="4" fill="#3f6e77"/>
        <circle cx="360" cy="200" r="4" fill="#3f6e77"/>
    </g>
</svg>
